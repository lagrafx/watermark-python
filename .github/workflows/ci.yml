name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pytest ruff

      - name: Run tests
        run: pytest -q

      - name: Run lint
        run: ruff check src tests
